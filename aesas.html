<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Automated Expense Splitting and Sharing</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#2c3e50;
color:white;
text-align:center;
padding:20px;
}

.container{
width:85%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:8px;
}

input,select,button{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

button{
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>Automated Expense Splitting and Sharing</h1>
</header>

<div class="container">

<h2>Add Expense</h2>

<label>Date</label>
<input type="date" id="date">

<label>Category</label>
<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Rent</option>
<option>Shopping</option>
</select>

<br>

<label>Total Bill</label>
<input type="number" id="bill" oninput="calculateGST()">

<label>GST (18%)</label>
<input type="number" id="gst" readonly>

<label>Total with GST</label>
<input type="number" id="total" readonly>

<br>

<label>Number of Persons</label>
<input type="number" id="persons" oninput="createPersons()">

<div id="names"></div>

<label>Who Paid?</label>
<select id="payer"></select>

<br>

<button onclick="addExpense()">Add Expense</button>

<h2>Transactions</h2>

<table>

<tr>
<th>Date</th>
<th>Category</th>
<th>Total</th>
<th>Payer</th>
<th>Per Person</th>
<th>Delete</th>
</tr>

<tbody id="table"></tbody>

</table>

<h3>Monthly Total: ₹ <span id="monthlyTotal">0</span></h3>

</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || []

function calculateGST(){

let bill = Number(document.getElementById("bill").value)

let gst = bill * 0.18

let total = bill + gst

document.getElementById("gst").value = gst.toFixed(2)
document.getElementById("total").value = total.toFixed(2)

}

function createPersons(){

let n = document.getElementById("persons").value

let namesDiv = document.getElementById("names")
let payer = document.getElementById("payer")

namesDiv.innerHTML=""
payer.innerHTML=""

for(let i=1;i<=n;i++){

namesDiv.innerHTML += `<input placeholder="Person ${i}" class="person">`

payer.innerHTML += `<option>Person ${i}</option>`

}

}

function addExpense(){

let date = document.getElementById("date").value
let category = document.getElementById("category").value
let total = Number(document.getElementById("total").value)

let persons = document.querySelectorAll(".person").length

let split = (total/persons).toFixed(2)

let payer = document.getElementById("payer").value

let expense = {date,category,total,payer,split}

expenses.push(expense)

localStorage.setItem("expenses",JSON.stringify(expenses))

loadTable()

}

function loadTable(){

let table = document.getElementById("table")

let sum = 0

table.innerHTML=""

expenses.forEach((e,i)=>{

sum += e.total

table.innerHTML +=
`<tr>

<td>${e.date}</td>
<td>${e.category}</td>
<td>${e.total}</td>
<td>${e.payer}</td>
<td>${e.split}</td>

<td>
<button onclick="del(${i})">Delete</button>
</td>

</tr>`

})

document.getElementById("monthlyTotal").innerText = sum

}

function del(i){

expenses.splice(i,1)

localStorage.setItem("expenses",JSON.stringify(expenses))

loadTable()

}

loadTable()

</script>

</body>
</html>
